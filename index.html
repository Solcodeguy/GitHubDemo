<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website Project</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }
      header, footer {
        background: #222;
        color: white;
        padding: 1rem;
      }
      main {
        flex: 1;
        padding: 2rem;
      }
      nav ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        gap: 1rem;
      }
      nav a {
        color: #ddd;
        text-decoration: none;
      }
      nav a:hover {
        color: white;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Welcome to the Website Project</h1>
      <nav>
        <ul>
          <li><a href="#home">Home</a></li>
          <li><a href="#about">About</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <section id="home">
        <h2>Home</h2>
        <p>This is the Website Project's landing page.</p>
      </section>
      <section id="about">
        <h2>About</h2>
        <p>Build your site with simple HTML, CSS, and JavaScript.</p>
      </section>
      <section id="contact">
        <h2>Contact</h2>
        <p>Reach out to the project owner for next steps.</p>
      </section>
    </main>
    <footer>
      <p>&copy; 2026 Website Project</p>
    </footer>
  </body>
</html>
